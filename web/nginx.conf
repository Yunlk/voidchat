# limit_req_zone 必须在 http 层级（server 外面）
limit_req_zone $binary_remote_addr zone=chat:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # 静态文件（直出，不经过 Python）
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API → FastAPI
    location /api/ {
        proxy_pass http://voidchat:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 必须关缓冲
        proxy_buffering off;
        proxy_cache off;

        # 超时（SSE 长连接）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # 限制请求体
        client_max_body_size 1m;
    }

    # 聊天页 → FastAPI
    location /chat {
        proxy_pass http://voidchat:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 首页
    location / {
        proxy_pass http://voidchat:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # /api/chat 限流（覆盖 /api/ 的通用规则）
    location /api/chat {
        limit_req zone=chat burst=5 nodelay;
        proxy_pass http://voidchat:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 1m;
    }

    # 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
}
